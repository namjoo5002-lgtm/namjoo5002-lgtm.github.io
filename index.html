<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>My Profile</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: sans-serif;
    }

    body {
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: white;
      width: 400px;
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .profile-img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
    }

    h1 {
      margin-top: 10px;
    }

    .section {
      margin-top: 20px;
    }

    /* 🔥 갤러리 핵심 */
    .gallery {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-top: 10px;
    }

    .gallery img {
      width: 90px;
      height: 90px;
      object-fit: cover;
      border-radius: 10px;
    }

  </style>
</head>

<body>

  <div class="card">

    <!-- 프로필 사진 -->
    <img src="./profile.jpg" class="profile-img">

    <h1>남주</h1>
    <p>International Trade × Engineering</p>

    <!-- 소개 -->
    <div class="section">
      <h2>About Me</h2>
      <p>공학과 통상을 함께 공부하는 대학생 🚀</p>
    </div>

    <!-- 🔥 사진 여러 장 -->
    <div class="section">
      <h2>My Photos</h2>

      <div class="gallery">
        <img src="./profile.jpg">
        <img src="./IMG_6041.HEIC">
      </div>

    </div>

  </div>

</body>
</html>
