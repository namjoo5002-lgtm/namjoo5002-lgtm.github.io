<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>My Profile</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: sans-serif;
    }

    body {
      background: url('./basketball.jpg') no-repeat center;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      position: relative;
    }

    /* 🔥 배경 어둡게 */
    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.4);
      top: 0;
      left: 0;
      z-index: 0;
    }

    .card {
      background: white;
      width: 400px;
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      position: relative;
      z-index: 1;
    }

    .profile-img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #ddd;
    }

    h1 {
      margin-top: 10px;
    }

    .section {
      margin-top: 20px;
    }

    /* 🔥 갤러리 */
    .gallery {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-top: 10px;
    }

    .gallery img {
      width: 90px;
      height: 90px;
      object-fit: cover;
      border-radius: 10px;
    }

    /* 버튼 */
    .buttons {
      margin-top: 20px;
    }

    .btn {
      display: inline-block;
      padding: 10px 15px;
      margin: 5px;
      border-radius: 10px;
      text-decoration: none;
      color: white;
      font-size: 14px;
    }

    .github {
      background: black;
    }

    .instagram {
      background: #e1306c;
    }

  </style>
</head>

<body>

  <div class="card">

    <!-- 🔥 프로필 사진 -->
    <img src="./me.jpg" class="profile-img">

    <h1>남주</h1>
    <p>International Trade × Engineering</p>

    <!-- 소개 -->
    <div class="section">
      <h2>About Me</h2>
      <p>
        국제통상학과에 재학 중이며<br>
        F1과 스포츠 관람을 좋아합니다 🚀
      </p>
    </div>

    <!-- 🔥 사진 갤러리 -->
    <div class="section">
      <h2>My Photos</h2>

      <div class="gallery">
        <img src="./meee.jpg">
        <img src="./basketball.jpg">
      </div>

    </div>

    <!-- 버튼 -->
    <div class="buttons">
      <a href="https://github.com/your-id" class="btn github">GitHub</a>
      <a href="https://instagram.com/your-id" class="btn instagram">Instagram</a>
    </div>

  </div>

</body>
</html>
